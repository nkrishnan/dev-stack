name: dev-stack CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: Lint shell scripts with shellcheck
        run: |
          shellcheck --severity=warning install.sh bin/dev-stack

      - name: Validate JSON files
        run: |
          python3 -m json.tool openrouter/models.json > /dev/null
          python3 -m json.tool opencode/opencode.json > /dev/null
          python3 -m json.tool templates/project/opencode.json > /dev/null
          python3 -m json.tool .devcontainer/devcontainer.json > /dev/null

      - name: Run tests
        run: bats tests/
