name: dev-stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip pre-commit
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run pre-commit (shellcheck, JSON, YAML, formatting)
        run: pre-commit run --all-files

      - name: Run tests
        run: bats tests/

      - name: Integration test — dev-stack init
        run: |
          tmp=$(mktemp -d)
          git -C "$tmp" init -b main
          cd "$tmp"
          DEV_STACK_HOME="$GITHUB_WORKSPACE" DEV_STACK_SKIP_TOOLS=1 OPENROUTER_API_KEY=test-key \
            "$GITHUB_WORKSPACE/bin/dev-stack" init
          test -f opencode.json
          test -f .cursor/rules/dev-stack.md
          grep -qxF .env.local .git/info/exclude
          grep -qxF .opencode-auth.json .git/info/exclude
